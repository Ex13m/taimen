# Проверка мозга: стучится в живой /api/chat и кладёт ответ в репо.
# У Actions открытый интернет — обходит сетевой блок рабочих сессий.
# Триггер: пуш файла docs/ops/ping.txt (в нём — адрес сайта) или вручную.
name: ping-brain

on:
  push:
    branches: [main]
    paths: ['docs/ops/ping.txt']
  workflow_dispatch:
    inputs:
      site:
        description: 'адрес сайта (https://taimen-orb.netlify.app)'
        required: false

concurrency: ping-brain

jobs:
  ping:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: постучаться в мозг (основной + запасной)
        run: |
          SITE="${{ inputs.site }}"
          [ -z "$SITE" ] && SITE="$(head -n1 docs/ops/ping.txt 2>/dev/null | tr -d '[:space:]')"
          [ -z "$SITE" ] && SITE="https://taimen-orb.netlify.app"
          echo "сайт: $SITE"
          mkdir -p docs/ops
          # ждём, пока задеплоится нужная версия (в ней живёт diag:backup)
          WANT="$(grep -o "APP_VERSION = '[^']*'" index.html | head -n1 | cut -d\' -f2)"
          echo "жду версию $WANT на сайте…"
          for i in $(seq 1 20); do
            live=$(curl -s "$SITE/index.html" | grep -o "APP_VERSION = '[^']*'" | head -n1 | cut -d\' -f2)
            echo "  попытка $i: на сайте $live"
            [ "$live" = "$WANT" ] && break
            sleep 15
          done
          # 1) обычный запрос — кто отвечает по умолчанию
          code=$(curl -s -o docs/ops/brain-ping.json -w "%{http_code}" \
            -X POST "$SITE/api/chat" -H "content-type: application/json" \
            --data '{"messages":[{"role":"user","content":"ответь одним словом: привет"}]}' || echo 000)
          model=$(grep -o '"model":"[^"]*"' docs/ops/brain-ping.json | head -n1 | cut -d'"' -f4)
          # 2) health-check ЗАПАСНОГО мозга напрямую (diag:backup) — доказать OpenRouter
          sleep 3
          bcode=$(curl -s -o docs/ops/brain-backup.json -w "%{http_code}" \
            -X POST "$SITE/api/chat" -H "content-type: application/json" \
            --data '{"diag":"backup","messages":[{"role":"user","content":"ответь одним словом: привет"}]}' || echo 000)
          bmodel=$(grep -o '"model":"[^"]*"' docs/ops/brain-backup.json | head -n1 | cut -d'"' -f4)
          berr=$(grep -o '"error":"[^"]*"' docs/ops/brain-backup.json | head -n1 | cut -d'"' -f4)
          {
            echo "=== ОСНОВНОЙ ==="
            echo "HTTP $code · модель: ${model:-—}"
            if echo "$model" | grep -qi openrouter; then echo "→ по умолчанию отвечает OpenRouter";
            elif echo "$model" | grep -qi claude; then echo "→ по умолчанию отвечает Anthropic (норма)"; fi
            echo ""
            echo "=== ЗАПАСНОЙ (OpenRouter/Replicate) ==="
            echo "HTTP $bcode · модель: ${bmodel:-—}"
            [ -n "$berr" ] && echo "ошибка: $berr"
            if echo "$bmodel" | grep -qi openrouter; then echo "ВЕРДИКТ: OpenRouter РАБОТАЕТ ✓ (ответил $bmodel)";
            elif echo "$bmodel" | grep -qi replicate; then echo "ВЕРДИКТ: OpenRouter молчит, но Replicate работает";
            elif [ -n "$berr" ]; then echo "ВЕРДИКТ: запасной мозг НЕ работает — $berr";
            else echo "ВЕРДИКТ: неясно, см. brain-backup.json"; fi
          } > docs/ops/brain-verdict.txt
          cat docs/ops/brain-verdict.txt
      - name: закоммитить результат
        run: |
          git config user.name "taimen-ping"
          git config user.email "ping@taimen.local"
          git add docs/ops/brain-ping.json docs/ops/brain-backup.json docs/ops/brain-verdict.txt
          git commit -m "ping: проверка мозга [skip ci]" || exit 0
          git push
