# Проверка мозга: стучится в живой /api/chat и кладёт ответ в репо.
# У Actions открытый интернет — обходит сетевой блок рабочих сессий.
# Триггер: пуш файла docs/ops/ping.txt (в нём — адрес сайта) или вручную.
name: ping-brain

on:
  push:
    branches: [main]
    paths: ['docs/ops/ping.txt']
  workflow_dispatch:
    inputs:
      site:
        description: 'адрес сайта (https://taimen-orb.netlify.app)'
        required: false

concurrency: ping-brain

jobs:
  ping:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: постучаться в мозг
        run: |
          SITE="${{ inputs.site }}"
          [ -z "$SITE" ] && SITE="$(head -n1 docs/ops/ping.txt 2>/dev/null | tr -d '[:space:]')"
          [ -z "$SITE" ] && SITE="https://taimen-orb.netlify.app"
          echo "сайт: $SITE"
          mkdir -p docs/ops
          code=$(curl -s -o docs/ops/brain-ping.json -w "%{http_code}" \
            -X POST "$SITE/api/chat" \
            -H "content-type: application/json" \
            --data '{"messages":[{"role":"user","content":"ответь одним словом: привет"}]}' || echo 000)
          echo "HTTP $code"
          # достаём поле model и статус в отдельный краткий файл
          model=$(grep -o '"model":"[^"]*"' docs/ops/brain-ping.json | head -n1 | cut -d'"' -f4)
          err=$(grep -o '"error":"[^"]*"' docs/ops/brain-ping.json | head -n1 | cut -d'"' -f4)
          {
            echo "проверка мозга: HTTP $code"
            echo "модель ответа: ${model:-—}"
            [ -n "$err" ] && echo "ошибка: $err"
            if echo "$model" | grep -qi openrouter; then echo "ВЕРДИКТ: отвечает OpenRouter (запасной мозг) ✓";
            elif echo "$model" | grep -qi claude; then echo "ВЕРДИКТ: отвечает Anthropic (основной); OpenRouter в резерве";
            elif echo "$model" | grep -qi replicate; then echo "ВЕРДИКТ: отвечает Replicate (запасной №2)";
            elif [ -n "$err" ]; then echo "ВЕРДИКТ: мозг не ответил — $err";
            else echo "ВЕРДИКТ: неясно, см. brain-ping.json"; fi
          } > docs/ops/brain-verdict.txt
          cat docs/ops/brain-verdict.txt
      - name: закоммитить результат
        run: |
          git config user.name "taimen-ping"
          git config user.email "ping@taimen.local"
          git add docs/ops/brain-ping.json docs/ops/brain-verdict.txt
          git commit -m "ping: проверка мозга [skip ci]" || exit 0
          git push
