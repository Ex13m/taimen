# Мост художника: по пушу очереди docs/book2/hf/queue.tsv качает картинки
# (Higgsfield/Replicate/Reve) в репозиторий — у Actions открытый интернет,
# у рабочих сессий сеть зарезана. Формат очереди: url<TAB>путь_в_репо.
name: fetch-assets

on:
  push:
    branches: [main]
    paths: ['docs/book2/hf/queue.tsv']

concurrency: fetch-assets

jobs:
  fetch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: скачать всё из очереди и закоммитить
        run: |
          set -e
          while IFS=$'\t' read -r url dest; do
            [ -z "$url" ] && continue
            case "$dest" in
              *..*|/*) echo "пропуск недопустимого пути: $dest"; continue;;
            esac
            case "$url" in
              https://*) ;;
              *) echo "пропуск не-https: $url"; continue;;
            esac
            mkdir -p "$(dirname "$dest")"
            echo "качаю: $url -> $dest"
            curl -fsSL --max-filesize 26214400 "$url" -o "$dest" || { echo "не скачалось: $url"; continue; }
            file "$dest"
            git add "$dest"
          done < docs/book2/hf/queue.tsv
          git config user.name "taimen-assets"
          git config user.email "assets@taimen.local"
          git commit -m "assets: картинки художника из очереди [skip ci]" || exit 0
          git push
