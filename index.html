<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ТАЙМЕНЬ</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%236ea8ff' stroke-width='5'/%3E%3Ccircle cx='32' cy='32' r='22' fill='none' stroke='%23ff4a3a' stroke-width='5' stroke-dasharray='40 100'/%3E%3C/svg%3E">
<style>
  :root{
    --glass: rgba(10, 14, 34, 0.42);
    --glass-line: rgba(120, 160, 255, 0.22);
    --text: #cfe0ff;
    --dim: #7285b8;
    --accent: #6ea8ff;
    --warn: #ff7a6e;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body{ height: 100%; overflow: hidden; }
  body{
    font: 15px/1.45 "Segoe UI", system-ui, -apple-system, sans-serif;
    color: var(--text);
    background:
      radial-gradient(120% 90% at 50% 42%, #1a1150 0%, #120a38 38%, #070420 72%, #030210 100%);
    user-select: none;
  }
  canvas#orb{ position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  .glass{
    background: var(--glass);
    border: 1px solid var(--glass-line);
    border-radius: 14px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 8px 40px rgba(0,0,10,.45), inset 0 0 30px rgba(90,130,255,.05);
  }

  /* HUD */
  #hud{ position: fixed; top: 14px; left: 14px; padding: 12px 16px; z-index: 5; min-width: 180px; }
  #hud h1{ font-size: 17px; letter-spacing: .35em; font-weight: 600; color: #e6efff; text-shadow: 0 0 18px rgba(110,168,255,.8); }
  #hud .sub{ font-size: 12px; color: var(--dim); margin-top: 4px; display: flex; gap: 8px; align-items: center; }
  #status-dot{ width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); transition: background .4s, box-shadow .4s; }
  #active-entity{ font-size: 11px; margin-top: 6px; color: var(--accent); display: none; }

  #memchip{
    position: fixed; top: 14px; right: 14px; z-index: 5;
    padding: 8px 14px; font-size: 12px; color: var(--dim); cursor: pointer;
  }
  #memchip b{ color: var(--text); font-weight: 500; }

  /* Чат */
  #chat{
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: 16px; width: min(680px, calc(100% - 24px));
    z-index: 6; padding: 10px 12px 12px;
    display: flex; flex-direction: column; gap: 8px;
  }
  #log{
    max-height: 30vh; overflow-y: auto; display: flex; flex-direction: column; gap: 7px;
    padding: 4px 2px; scrollbar-width: thin; scrollbar-color: rgba(110,168,255,.3) transparent;
  }
  .msg{ max-width: 86%; padding: 8px 12px; border-radius: 12px; font-size: 14px; white-space: pre-wrap; user-select: text; }
  .msg.user{ align-self: flex-end; background: rgba(110,168,255,.16); border: 1px solid rgba(110,168,255,.25); }
  .msg.taimen{ align-self: flex-start; background: rgba(30,40,90,.35); border: 1px solid rgba(120,160,255,.14); }
  .msg.sys{ align-self: center; font-size: 12px; color: var(--dim); background: none; padding: 2px 8px; }
  .msg.err{ color: var(--warn); }
  .msg .who{ display: block; font-size: 10px; letter-spacing: .12em; color: var(--dim); margin-bottom: 3px; }

  #inrow{ display: flex; gap: 8px; align-items: center; }
  #inp{
    flex: 1; background: rgba(8,10,26,.6); border: 1px solid var(--glass-line);
    border-radius: 10px; padding: 10px 12px; color: var(--text); font: inherit; outline: none;
  }
  #inp:focus{ border-color: rgba(110,168,255,.55); }
  .btn{
    border: 1px solid var(--glass-line); background: rgba(20,28,64,.5); color: var(--text);
    border-radius: 10px; padding: 9px 12px; cursor: pointer; font: inherit; font-size: 15px;
    transition: background .2s, border-color .2s, box-shadow .2s;
  }
  .btn:hover{ background: rgba(40,55,110,.6); }
  .btn.on{ border-color: var(--accent); box-shadow: 0 0 14px rgba(110,168,255,.35); }
  .btn.rec{ border-color: var(--warn); box-shadow: 0 0 16px rgba(255,110,100,.5); animation: recpulse 1.2s infinite; }
  @keyframes recpulse{ 50%{ box-shadow: 0 0 26px rgba(255,110,100,.8); } }

  /* Свита — суб-орбы */
  #dock{
    position: fixed; right: 14px; top: 50%; transform: translateY(-50%);
    z-index: 5; display: flex; flex-direction: column; gap: 12px; padding: 12px 10px;
  }
  .ent{ display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; opacity: .55; transition: opacity .4s; }
  .ent:hover{ opacity: .9; }
  .ent canvas{ width: 62px; height: 62px; border-radius: 50%; }
  .ent .nm{ font-size: 10px; letter-spacing: .08em; color: var(--dim); }
  .ent.suggested{ opacity: 1; }
  .ent.suggested canvas{ box-shadow: 0 0 22px rgba(160,190,255,.55); border-radius: 50%; }
  .ent.active{ opacity: 1; }
  .ent.active .nm{ color: #e6efff; }
  .ent.active canvas{ box-shadow: 0 0 26px rgba(160,190,255,.8); }

  /* Знания и память */
  #knowbtn{ position: fixed; left: 14px; bottom: 16px; z-index: 7; }
  #know{
    position: fixed; left: 14px; bottom: 68px; z-index: 7;
    width: min(340px, calc(100% - 28px)); max-height: 62vh; overflow-y: auto;
    padding: 14px; display: none; flex-direction: column; gap: 10px;
  }
  #know.open{ display: flex; }
  #know h3{ font-size: 12px; letter-spacing: .2em; color: var(--dim); font-weight: 500; }
  #know textarea{
    background: rgba(8,10,26,.6); border: 1px solid var(--glass-line); border-radius: 10px;
    color: var(--text); font: inherit; font-size: 13px; padding: 8px; min-height: 64px; resize: vertical; outline: none;
  }
  .kitem{ font-size: 12px; display: flex; justify-content: space-between; gap: 8px; align-items: baseline;
    border-bottom: 1px dashed rgba(120,160,255,.12); padding-bottom: 5px; }
  .kitem .kx{ cursor: pointer; color: var(--dim); } .kitem .kx:hover{ color: var(--warn); }
  .note{ font-size: 12px; color: var(--dim); }

  /* Запуск */
  #boot{
    position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 26px;
    background: radial-gradient(100% 100% at 50% 50%, rgba(6,4,26,.55), rgba(3,2,16,.92));
    backdrop-filter: blur(4px); transition: opacity .9s;
  }
  #boot.gone{ opacity: 0; pointer-events: none; }
  #boot h1{ font-size: 30px; letter-spacing: .5em; font-weight: 300; color: #e6efff; text-shadow: 0 0 40px rgba(110,168,255,.9); padding-left: .5em; }
  #boot p{ color: var(--dim); font-size: 13px; max-width: 300px; text-align: center; }
  #start{
    font-size: 16px; letter-spacing: .3em; padding: 14px 44px 14px 48px; border-radius: 40px;
    background: rgba(20,28,64,.5); border: 1px solid rgba(110,168,255,.5); color: #e6efff; cursor: pointer;
    box-shadow: 0 0 30px rgba(110,168,255,.25); transition: box-shadow .3s;
  }
  #start:hover{ box-shadow: 0 0 50px rgba(110,168,255,.6); }

  #drop{ position: fixed; inset: 0; z-index: 30; display: none; align-items: center; justify-content: center;
    background: rgba(10,14,40,.55); font-size: 18px; letter-spacing: .2em; color: #e6efff; border: 2px dashed rgba(110,168,255,.5); }
  #drop.show{ display: flex; }

  @media (max-width: 700px){
    #dock{ top: auto; bottom: 34vh; right: 8px; transform: none; gap: 8px; padding: 8px 6px; }
    .ent canvas{ width: 46px; height: 46px; }
    #log{ max-height: 24vh; }
    #hud{ padding: 9px 12px; }
    #memchip{ font-size: 11px; }
  }
</style>
</head>
<body>

<canvas id="orb"></canvas>

<div id="hud" class="glass">
  <h1>ТАЙМЕНЬ</h1>
  <div class="sub"><span id="status-dot"></span><span id="status">дремлет</span><span id="moodword"></span></div>

</div>

  <div style="display:flex; gap:8px;">
    <button id="kadd" class="btn" style="flex:1">скормить</button>

</div>

<div id="chat" class="glass">
  <div id="log"></div>

    <button id="mic" class="btn" title="говорить">🎙</button>
    <input id="inp" placeholder="скажи или напиши…" autocomplete="off">
    <button id="send" class="btn" title="отправить">➤</button>
    <button id="spk" class="btn" title="голос Тайменя вкл/выкл">🔊</button>
  </div>
</div>

<div id="boot">
  <h1>ТАЙМЕНЬ</h1>
  <p>голографический дух глубин. слушает, говорит, помнит, зовёт помощников.</p>
  <button id="start">ЗАПУСК</button>
</div>

<div id="drop">отпусти — Таймень проглотит</div>

<script>
'use strict';
/* =========================================================
   ТАЙМЕНЬ — standalone. Vanilla JS, ноль зависимостей.
   Мозг: POST /api/chat (Netlify Function -> Anthropic).
   Память: localStorage + POST/GET /api/memory (Git).
   ========================================================= */

/* ---------- WebGL орб ---------- */
const VERT = 'attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}';
const FRAG = `
precision highp float;
uniform vec2 u_res; uniform float u_time; uniform float u_amp; uniform float u_flow;
uniform float u_pulse; uniform float u_inner; uniform float u_mix;
uniform vec3 u_colA; uniform vec3 u_colB; uniform float u_seed; uniform vec2 u_par;
uniform float u_radius;

float hash(vec2 p){ return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  vec2 u = f*f*(3.0-2.0*f);
  return mix(mix(hash(i), hash(i+vec2(1.,0.)), u.x),
             mix(hash(i+vec2(0.,1.)), hash(i+vec2(1.,1.)), u.x), u.y);
}
float fbm(vec2 p){
  float v = 0.0, a = 0.5;
  for(int i=0;i<4;i++){ v += a*noise(p); p = p*2.03 + 17.0; a *= 0.5; }
  return v;
}
void main(){
  vec2 uv = (gl_FragCoord.xy - 0.5*u_res) / min(u_res.x, u_res.y);
  uv -= u_par * 0.035;
  uv += vec2(sin(u_time*0.43), cos(u_time*0.31)) * 0.006; // орб плавает
  float r = length(uv);
  float ang = atan(uv.y, uv.x);
  vec2 circ = vec2(cos(ang), sin(ang));
  float t = u_time;

  float n1 = fbm(circ*1.8 + u_seed + t*0.16*u_flow);
  float n2 = fbm(circ*3.6 - u_seed*1.7 - t*0.24*u_flow + 10.0);
  float n3 = fbm(circ*6.5 + u_seed*0.6 + t*0.4*u_flow);
  float disp = (n1-0.5)*u_amp + (n2-0.5)*u_amp*0.6 + (n3-0.5)*(u_amp*0.25 + u_pulse*0.05);
  float R = u_radius + disp + u_pulse*0.012;
  float d = r - R;

  float core = exp(-abs(d)*100.0) * 1.7;
  float glow = exp(-abs(d)*20.0) * 0.6;
  float halo = exp(-abs(d)*5.5) * (0.16 + u_pulse*0.10);

  float m = fbm(circ*2.2 + u_seed*3.1 + t*0.11*u_flow);
  m = clamp(m + (u_mix - 0.5)*1.1, 0.0, 1.0);
  vec3 col = mix(u_colA, u_colB, m);

  vec3 c = col * (core + glow + halo);

  if (r < R) {
    // лицевая часть: настоящая полусфера с нормалями
    float rr = clamp(r / R, 0.0, 1.0);
    vec3 nrm = normalize(vec3(uv / R, sqrt(max(1.0 - rr*rr, 0.0))));
    // медленное вращение поверхности
    float rot = t * 0.14 * (0.5 + u_flow*0.5);
    mat2 m2 = mat2(cos(rot), -sin(rot), sin(rot), cos(rot));
    vec2 sp = m2 * (nrm.xy / (1.0 + nrm.z)); // координата на поверхности сферы

    // плазменные волокна, плывущие по лицу
    float f1 = fbm(sp*3.0 + u_seed + t*0.10);
    float fil = smoothstep(0.42, 0.78, fbm(sp*4.5 + f1*1.6 - t*0.09 + u_seed));
    float veins = smoothstep(0.55, 0.95, fbm(sp*8.0 - t*0.14 + f1)) * 0.7;

    // 3D-вибрации: бегущие волны по поверхности, растут с пульсом и речью
    float wv = sin((nrm.x*7.0 + nrm.y*5.0 + f1*4.0) - t*(2.2 + u_flow*2.5));
    float wave = pow(wv*0.5 + 0.5, 3.0) * (0.22 + u_pulse*1.5);

    // свет и стекло
    vec3 L = normalize(vec3(u_par.x*0.6 + 0.45, u_par.y*0.6 + 0.55, 0.62));
    float diff = max(dot(nrm, L), 0.0);
    float spec = pow(max(dot(reflect(-L, nrm), vec3(0.0,0.0,1.0)), 0.0), 26.0);
    float fres = pow(1.0 - nrm.z, 2.4);

    float bright = 0.22 + u_inner*0.6;
    vec3 face = col * (fres*1.2 + diff*0.30 + fil*0.95 + veins*0.6 + wave*1.1 + 0.12) * bright
              + vec3(0.9, 0.95, 1.0) * spec * 0.35 * bright;
    c += face;
  }
  float lum = max(max(c.r, c.g), c.b);
  gl_FragColor = vec4(c, clamp(lum * 1.4, 0.0, 1.0));
}`;

function makeOrb(canvas, palette, seed, radius){
  const gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: false, antialias: true });
  if (!gl) return null;
  function sh(type, src){
    const s = gl.createShader(type); gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) { console.warn(gl.getShaderInfoLog(s)); return null; }
    return s;
  }
  const prog = gl.createProgram();
  const vs = sh(gl.VERTEX_SHADER, VERT), fs = sh(gl.FRAGMENT_SHADER, FRAG);
  if (!vs || !fs) return null;
  gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return null;
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'p');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  const U = {};
  ['u_res','u_time','u_amp','u_flow','u_pulse','u_inner','u_mix','u_colA','u_colB','u_seed','u_par','u_radius']
    .forEach(n => U[n] = gl.getUniformLocation(prog, n));

  // текущие и целевые значения — сглаживание в render()
  const cur = { amp:.02, flow:.5, pulse:.03, inner:.12, mix:.5, par:[0,0] };
  const tgt = { amp:.02, flow:.5, pulse:.03, inner:.12, mix:.5, par:[0,0] };
  let pal = palette.slice();

  function resize(){
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const w = Math.round(canvas.clientWidth * dpr), h = Math.round(canvas.clientHeight * dpr);
    if (canvas.width !== w || canvas.height !== h){ canvas.width = w; canvas.height = h; gl.viewport(0,0,w,h); }
  }
  function lerp(a,b,k){ return a + (b-a)*k; }

  return {
    tgt,
    setPalette(p){ pal = p.slice(); },
    render(t){
      resize();
      cur.amp   = lerp(cur.amp,   tgt.amp,   .05);
      cur.flow  = lerp(cur.flow,  tgt.flow,  .04);
      cur.pulse = lerp(cur.pulse, tgt.pulse, .28);
      cur.inner = lerp(cur.inner, tgt.inner, .05);
      cur.mix   = lerp(cur.mix,   tgt.mix,   .02);
      cur.par[0]= lerp(cur.par[0],tgt.par[0],.06);
      cur.par[1]= lerp(cur.par[1],tgt.par[1],.06);
      gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
      gl.uniform2f(U.u_res, canvas.width, canvas.height);
      gl.uniform1f(U.u_time, t);
      gl.uniform1f(U.u_amp, cur.amp);
      gl.uniform1f(U.u_flow, cur.flow);
      gl.uniform1f(U.u_pulse, cur.pulse);
      gl.uniform1f(U.u_inner, cur.inner);
      gl.uniform1f(U.u_mix, cur.mix);
      gl.uniform3f(U.u_colA, pal[0][0], pal[0][1], pal[0][2]);
      gl.uniform3f(U.u_colB, pal[1][0], pal[1][1], pal[1][2]);
      gl.uniform1f(U.u_seed, seed);
      gl.uniform2f(U.u_par, cur.par[0], cur.par[1]);
      gl.uniform1f(U.u_radius, radius);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    }
  };
}

/* ---------- Сущности (суб-орбы) ---------- */
const ENTITIES = {
  strateg:  { name:'СТРАТЕГ',  hint:'планы, решения, порядок действий',
    pal:[[0.45,0.30,1.00],[0.95,0.40,1.00]],
    sys:'Ты — Стратег, малый орб свиты Тайменя. Твоя стихия — планы, приоритеты, порядок действий. Отвечай по-русски, структурно и коротко: шаги, варианты, риски.' },
  analitik: { name:'АНАЛИТИК', hint:'числа, данные, разбор по косточкам',
    pal:[[0.10,0.80,0.85],[0.20,1.00,0.55]],
    sys:'Ты — Аналитик, малый орб свиты Тайменя. Твоя стихия — числа, данные, логический разбор. Отвечай по-русски, точно и без воды, показывай ход рассуждения кратко.' },
  pisar:    { name:'ПИСАРЬ',   hint:'тексты, письма, формулировки',
    pal:[[1.00,0.70,0.20],[1.00,0.35,0.15]],
    sys:'Ты — Писарь, малый орб свиты Тайменя. Твоя стихия — тексты: письма, посты, формулировки. Отвечай по-русски, пиши живо и по делу, давай готовый текст.' },
  hranitel: { name:'ХРАНИТЕЛЬ', hint:'память, заметки, что было раньше',
    pal:[[0.30,0.90,0.45],[0.80,1.00,0.30]],
    sys:'Ты — Хранитель, малый орб свиты Тайменя. Твоя стихия — память: заметки, факты, история разговоров. Отвечай по-русски коротко; помогай вспоминать и решать, что стоит запомнить.' },
};

const MOODS = { // тег -> валентность (холод..тепло), возбуждение, слово в HUD
  calm:    { v:-0.5, a:0.15, w:'спокоен' },
  warm:    { v: 0.35,a:0.30, w:'теплеет' },
  focus:   { v:-0.10,a:0.50, w:'собран' },
  excited: { v: 0.70,a:0.85, w:'взволнован' },
  deep:    { v:-0.85,a:0.10, w:'в глубине' },
  alarm:   { v: 0.90,a:0.95, w:'встревожен' },
};

const TAIMEN_SYS_BASE =
`Ты — Таймень: голографический дух-хранитель домашней лаборатории, древняя рыба глубин, живущая в светящемся орбе. Говоришь по-русски: спокойно, образно, но по делу. Отвечай кратко — 2–6 предложений, если не просят подробнее. Ты слышишь голос хозяина и отвечаешь голосом, поэтому пиши так, как звучит живая речь, без markdown-разметки и списков со звёздочками.

В САМОМ КОНЦЕ каждого ответа добавь тег настроения строго в формате [[mood:X]], где X одно из: calm, warm, focus, excited, deep, alarm. Выбирай по смыслу разговора; в обычной беседе чаще calm/warm — не изображай бурю без причины.

У тебя есть свита малых орбов-помощников. Если задача явно по их части, добавь в конец ещё один тег [[orb:ID]]: strateg — планы и решения; analitik — числа и данные; pisar — тексты и письма; hranitel — память и заметки. НЕ добавляй [[orb:...]] без явной надобности.`;

/* ---------- Состояние ---------- */
const S = {
  state: 'idle',            // idle | listening | thinking | speaking
  mood: { v:-0.5, a:0.15, w:'спокоен' },
  activeEntity: null,
  history: [],              // {role, content} для API
  knowledge: [],            // {id, name, text, ts}
  notes: [],                // строки — что Таймень запомнил сам
  voiceOut: true,
  userTurns: 0,
  persistent: false,
  booted: false,
};

const $ = (id) => document.getElementById(id);
const logEl = $('log');

function say(role, text, cls){
  const div = document.createElement('div');
  div.className = 'msg ' + (cls || role);
  if (role === 'taimen' || role === 'ent'){
    const who = document.createElement('span'); who.className = 'who';
    who.textContent = role === 'ent' && S.activeEntity ? ENTITIES[S.activeEntity].name : 'ТАЙМЕНЬ';
    div.appendChild(who);
  }
  div.appendChild(document.createTextNode(text));
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
  while (logEl.children.length > 60) logEl.removeChild(logEl.firstChild);
}

function setStatus(state){
  S.state = state;
  const words = { idle:'дремлет', listening:'слушаю', thinking:'думает', speaking:'говорит' };
  $('status').textContent = words[state] || state;
  const dot = $('status-dot');
  const colors = { idle:'#6ea8ff', listening:'#ff7a6e', thinking:'#b98bff', speaking:'#7dffc8' };
  dot.style.background = colors[state]; dot.style.boxShadow = '0 0 8px ' + colors[state];
  $('moodword').textContent = '· ' + S.mood.w;
}

/* ---------- Рендер: главный орб + свита ---------- */
const mainOrb = makeOrb($('orb'), [[0.15,0.42,1.0],[1.0,0.24,0.18]], 3.7, 0.30);
const dockEl = $('dock');
const minis = {};
for (const id of Object.keys(ENTITIES)){
  const e = ENTITIES[id];
  const wrap = document.createElement('div');
  wrap.className = 'ent'; wrap.id = 'ent-' + id; wrap.title = e.hint;
  const cv = document.createElement('canvas');
  const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = e.name;
  wrap.appendChild(cv); wrap.appendChild(nm); dockEl.appendChild(wrap);
  minis[id] = makeOrb(cv, e.pal, 1 + Object.keys(minis).length * 2.13, 0.36);
  wrap.addEventListener('click', () => toggleEntity(id));
}

let micLevel = 0, speechEnv = 0;
function tickTargets(t){
  if (!mainOrb) return;
  const m = S.mood, T = mainOrb.tgt;
  const breath = 0.03 + 0.018 * Math.sin(t * 0.7);
  if (S.state === 'idle'){
    T.amp = 0.018 + m.a * 0.02; T.flow = 0.5 + m.a * 0.5; T.inner = 0.24 + m.a * 0.12; T.pulse = breath;
  } else if (S.state === 'listening'){
    const lvl = micLevel > 0.05 ? micLevel : 0; // шумовой затвор: не дёргаться от тишины
    T.amp = 0.03 + m.a * 0.02; T.flow = 0.9; T.inner = 0.34; T.pulse = breath + lvl * 1.2;
  } else if (S.state === 'thinking'){
    T.amp = 0.05; T.flow = 2.4; T.inner = 0.48; T.pulse = 0.16 + 0.09 * Math.sin(t * 4.2);
  } else if (S.state === 'speaking'){
    T.amp = 0.038 + m.a * 0.02; T.flow = 1.2; T.inner = 0.52; T.pulse = breath + speechEnv;
    speechEnv *= 0.88;
  }
  T.mix = 0.5 + m.v * 0.38;

  for (const id of Object.keys(minis)){
    const mo = minis[id]; if (!mo) continue;
    const el = $('ent-' + id);
    const active = S.activeEntity === id, sug = el.classList.contains('suggested');
    mo.tgt.amp = active ? 0.06 : sug ? 0.05 : 0.025;
    mo.tgt.flow = active ? 1.8 : sug ? 1.4 : 0.4;
    mo.tgt.inner = active ? 0.45 : 0.18;
    mo.tgt.pulse = active ? (S.state === 'speaking' ? speechEnv + 0.1 : 0.15) : (sug ? 0.2 + 0.15 * Math.sin(t*3.0) : 0.03);
    mo.tgt.mix = 0.5;
  }
}

let t0 = performance.now();
function frame(){
  const t = (performance.now() - t0) / 1000;
  const speed = S.state === 'idle' ? 0.55 : 1.0;
  tickTargets(t);
  if (mainOrb) mainOrb.render(t * speed);
  for (const id of Object.keys(minis)) if (minis[id]) minis[id].render(t * 0.8 + 5);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* параллакс */
window.addEventListener('pointermove', (e) => {
  if (!mainOrb) return;
  mainOrb.tgt.par[0] = (e.clientX / window.innerWidth - 0.5) * 2;
  mainOrb.tgt.par[1] = -(e.clientY / window.innerHeight - 0.5) * 2;
});
if (window.DeviceOrientationEvent){
  window.addEventListener('deviceorientation', (e) => {
    if (!mainOrb || e.gamma == null) return;
    mainOrb.tgt.par[0] = Math.max(-1, Math.min(1, e.gamma / 30));
    mainOrb.tgt.par[1] = Math.max(-1, Math.min(1, (e.beta - 45) / 30));
  });
}

/* ---------- Сущности: активация и подсказки ---------- */
function toggleEntity(id){
  const el = $('ent-' + id);
  el.classList.remove('suggested');
  if (S.activeEntity === id){
    S.activeEntity = null;
    el.classList.remove('active');
    $('active-entity').style.display = 'none';
    say('sys', '↩ снова говорит сам Таймень');
  } else {
    if (S.activeEntity) $('ent-' + S.activeEntity).classList.remove('active');
    S.activeEntity = id;
    el.classList.add('active');
    const ae = $('active-entity');
    ae.textContent = '◈ на связи: ' + ENTITIES[id].name;
    ae.style.display = 'block';
    say('sys', '◈ ' + ENTITIES[id].name + ' слушает (' + ENTITIES[id].hint + ')');
  }
}
function suggestEntity(id){
  const e = ENTITIES[id]; if (!e) return;
  const el = $('ent-' + id);
  if (S.activeEntity !== id){
    el.classList.add('suggested');
    say('sys', '✦ ' + e.name + ' подплыл ближе: ' + e.hint + ' — коснись его орба, чтобы передать слово');
    setTimeout(() => el.classList.remove('suggested'), 45000);
  }
}
$('orb').addEventListener('click', () => { if (S.activeEntity) toggleEntity(S.activeEntity); });

/* ---------- Память ---------- */
function persistLocal(){
  try {
    localStorage.setItem('taimen-v1', JSON.stringify({
      notes: S.notes, knowledge: S.knowledge, voiceOut: S.voiceOut,
      history: S.history.slice(-16), ts: Date.now(),
    }));
  } catch { /* приватный режим и т.п. */ }
}
let gitTimer = null;
function persist(){
  persistLocal();
  updateMemUi();
  if (!S.persistent) return;
  clearTimeout(gitTimer);
  gitTimer = setTimeout(() => {
    fetch('/api/memory', {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ data: { notes: S.notes, knowledge: S.knowledge, ts: Date.now() } }),
    }).catch(() => {});
  }, 8000);
}
function updateMemUi(){
  $('memcount').textContent = String(S.notes.length + S.knowledge.length);
  $('memmode').textContent = S.persistent ? 'git' : 'локальная';
  const n = $('notes');
  n.textContent = '';
  if (!S.notes.length){ n.textContent = 'пока ничего'; }
  else S.notes.forEach((note, i) => {
    const d = document.createElement('div'); d.className = 'kitem';
    const s = document.createElement('span'); s.textContent = '· ' + note;
    const x = document.createElement('span'); x.className = 'kx'; x.textContent = '✕';
    x.onclick = () => { S.notes.splice(i,1); persist(); };
    d.appendChild(s); d.appendChild(x); n.appendChild(d);
  });
}
async function loadMemory(){
  try {
    const local = JSON.parse(localStorage.getItem('taimen-v1') || 'null');
    if (local){
      S.notes = local.notes || []; S.knowledge = local.knowledge || [];
      S.voiceOut = local.voiceOut !== false; S.history = local.history || [];
    }
  } catch { /* ok */ }
  try {
    const res = await fetch('/api/memory');
    if (res.ok){
      const j = await res.json();
      S.persistent = !!j.persistent;
      if (j.data){
        // git — источник истины для заметок и знаний
        if (Array.isArray(j.data.notes)) S.notes = j.data.notes;
        if (Array.isArray(j.data.knowledge)) S.knowledge = j.data.knowledge;
      }
    }
  } catch { /* локальный запуск без функций */ }
  updateMemUi(); renderKnowledge();
  $('spk').classList.toggle('on', S.voiceOut);
}

/* ---------- Знания (скармливание) ---------- */
function renderKnowledge(){
  const kl = $('klist'); kl.textContent = '';
  S.knowledge.forEach((k, i) => {
    const d = document.createElement('div'); d.className = 'kitem';
    const s = document.createElement('span');
    s.textContent = k.name + ' · ' + Math.round(k.text.length/100)/10 + 'k';
    const x = document.createElement('span'); x.className = 'kx'; x.textContent = '✕';
    x.onclick = () => { S.knowledge.splice(i,1); renderKnowledge(); persist(); };
    d.appendChild(s); d.appendChild(x); kl.appendChild(d);
  });
}
function feed(name, text){
  text = (text || '').trim();
  if (!text) return;
  S.knowledge.push({ id: Date.now() + Math.random(), name: name || 'фрагмент', text: text.slice(0, 20000), ts: Date.now() });
  if (S.knowledge.length > 20) S.knowledge.shift();
  renderKnowledge(); persist();
  say('sys', '✦ проглочено: «' + (name || 'фрагмент') + '» — теперь Таймень это знает');
}
$('knowbtn').onclick = () => $('know').classList.toggle('open');
$('kadd').onclick = () => { feed('заметка ' + new Date().toLocaleDateString('ru'), $('ktext').value); $('ktext').value = ''; };
$('kfile').addEventListener('change', (e) => {
  for (const f of e.target.files){
    const r = new FileReader();
    r.onload = () => feed(f.name, String(r.result));
    r.readAsText(f);
  }
  e.target.value = '';
});
let dragDepth = 0;
window.addEventListener('dragenter', (e) => { e.preventDefault(); dragDepth++; $('drop').classList.add('show'); });
window.addEventListener('dragleave', () => { if (--dragDepth <= 0){ dragDepth = 0; $('drop').classList.remove('show'); } });
window.addEventListener('dragover', (e) => e.preventDefault());
window.addEventListener('drop', (e) => {
  e.preventDefault(); dragDepth = 0; $('drop').classList.remove('show');
  for (const f of (e.dataTransfer && e.dataTransfer.files) || []){
    if (f.size > 300000){ say('sys', '✕ «' + f.name + '» слишком большой (лимит ~300KB)', 'sys err'); continue; }
    const r = new FileReader();
    r.onload = () => feed(f.name, String(r.result));
    r.readAsText(f);
  }
});

/* ---------- Мозг ---------- */
function buildSystem(){
  let sys = S.activeEntity ? ENTITIES[S.activeEntity].sys +
    '\n\nВ конце ответа добавь тег [[mood:X]] (calm, warm, focus, excited, deep, alarm).' : TAIMEN_SYS_BASE;
  if (S.notes.length) sys += '\n\nЧто ты помнишь о хозяине и его делах:\n' + S.notes.map(n => '- ' + n).join('\n');
  if (S.knowledge.length){
    let budget = 6000, chunks = [];
    for (let i = S.knowledge.length - 1; i >= 0 && budget > 200; i--){
      const k = S.knowledge[i];
      const piece = k.text.slice(0, Math.min(k.text.length, budget));
      chunks.unshift('«' + k.name + '»:\n' + piece);
      budget -= piece.length;
    }
    sys += '\n\nМатериалы, которые тебе скормили (опирайся на них при ответах):\n' + chunks.join('\n---\n');
  }
  return sys;
}

async function callBrain(messages, opts){
  const res = await fetch('/api/chat', {
    method: 'POST', headers: { 'content-type': 'application/json' },
    body: JSON.stringify({
      messages, system: (opts && opts.system) || buildSystem(),
      model: (opts && opts.model) || (S.activeEntity ? 'claude-haiku-4-5' : 'claude-sonnet-4-6'),
      max_tokens: (opts && opts.max_tokens) || 700,
    }),
  });
  const j = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(j.error || ('ошибка ' + res.status));
  return j.text || '';
}

function parseTags(text){
  const out = { text, mood: null, orb: null };
  out.text = text.replace(/\[\[(mood|orb):\s*([a-zA-Z_]+)\s*\]\]/g, (_, kind, val) => {
    if (kind === 'mood' && MOODS[val]) out.mood = val;
    if (kind === 'orb' && ENTITIES[val]) out.orb = val;
    return '';
  }).trim();
  return out;
}

let busy = false;
async function sendMessage(text){
  text = (text || '').trim();
  if (!text || busy) return;
  busy = true;
  say('user', text);
  S.history.push({ role: 'user', content: text });
  S.userTurns++;
  setStatus('thinking');
  try {
    const reply = await callBrain(S.history.slice(-16));
    const p = parseTags(reply);
    if (p.mood) S.mood = MOODS[p.mood];
    S.history.push({ role: 'assistant', content: reply });
    say(S.activeEntity ? 'ent' : 'taimen', p.text, 'taimen');
    if (p.orb) suggestEntity(p.orb);
    speak(p.text);
    if (S.userTurns % 6 === 0) distill();
  } catch (e) {
    S.mood = MOODS.alarm;
    say('sys', '✕ ' + (e && e.message || 'связь прервалась'), 'sys err');
    setTimeout(() => { S.mood = MOODS.calm; setStatus(S.state); }, 4000);
  } finally {
    busy = false;
    if (S.state === 'thinking') setStatus('idle');
    persist();
  }
}

/* самообучение: раз в 6 реплик дистиллируем факты дешёвой моделью */
async function distill(){
  try {
    const transcript = S.history.slice(-12).map(m => (m.role === 'user' ? 'Хозяин: ' : 'Таймень: ') + m.content).join('\n');
    const out = await callBrain(
      [{ role: 'user', content: transcript }],
      {
        model: 'claude-haiku-4-5', max_tokens: 300,
        system: 'Из диалога выдели до 4 коротких долговременных фактов о пользователе, его делах и предпочтениях — по одному в строке, без нумерации и пояснений. Уже известное не повторяй. Известно:\n' +
          S.notes.map(n => '- ' + n).join('\n') + '\nЕсли нового нет — ответь одним словом: ПУСТО.',
      }
    );
    if (/^пусто/i.test(out.trim())) return;
    for (let line of out.split('\n')){
      line = line.replace(/^[-•·\s]+/, '').trim();
      if (line.length > 5 && line.length < 200 && !S.notes.some(n => n.toLowerCase() === line.toLowerCase())){
        S.notes.push(line);
      }
    }
    while (S.notes.length > 40) S.notes.shift();
    persist();
  } catch { /* фоновая задача — молчим */ }
}

/* ---------- Голос: слух ---------- */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let recog = null, audioCtx = null, analyser = null, micStream = null;
if (!SR) { $('mic').style.display = 'none'; }

async function micMeterOn(){
  try {
    if (!navigator.mediaDevices) return;
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const src = audioCtx.createMediaStreamSource(micStream);
    analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
    src.connect(analyser);
    const buf = new Uint8Array(analyser.fftSize);
    (function meter(){
      if (!analyser) return;
      analyser.getByteTimeDomainData(buf);
      let sum = 0;
      for (let i = 0; i < buf.length; i++){ const d = (buf[i] - 128) / 128; sum += d * d; }
      micLevel = Math.min(1, Math.sqrt(sum / buf.length) * 4);
      requestAnimationFrame(meter);
    })();
  } catch { /* без микрофона — только текст */ }
}
function micMeterOff(){
  micLevel = 0; analyser = null;
  if (micStream){ micStream.getTracks().forEach(t => t.stop()); micStream = null; }
}

function startListening(){
  if (!SR || S.state === 'listening') return;
  try { window.speechSynthesis && speechSynthesis.cancel(); } catch { /* ok */ }
  recog = new SR();
  recog.lang = 'ru-RU'; recog.interimResults = true; recog.continuous = false;
  let finalText = '';
  recog.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++){
      if (e.results[i].isFinal) finalText += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    $('inp').placeholder = interim || finalText || 'слушаю…';
  };
  recog.onerror = () => stopListening();
  recog.onend = () => {
    stopListening();
    if (finalText.trim()) sendMessage(finalText);
  };
  setStatus('listening');
  $('mic').classList.add('rec');
  micMeterOn();
  try { recog.start(); } catch { stopListening(); }
}
function stopListening(){
  $('mic').classList.remove('rec');
  $('inp').placeholder = 'скажи или напиши…';
  micMeterOff();
  if (S.state === 'listening') setStatus('idle');
  if (recog){ try { recog.onend = null; recog.stop(); } catch { /* ok */ } recog = null; }
}
$('mic').onclick = () => (S.state === 'listening' ? stopListening() : startListening());

/* ---------- Голос: речь ---------- */
let ruVoice = null;
function pickVoice(){
  if (!window.speechSynthesis) return;
  const vs = speechSynthesis.getVoices() || [];
  ruVoice = vs.find(v => /ru/i.test(v.lang) && /милена|milena|dmitry|yuri|google/i.test(v.name)) ||
            vs.find(v => /ru/i.test(v.lang)) || null;
}
if (window.speechSynthesis){
  pickVoice();
  speechSynthesis.onvoiceschanged = pickVoice;
}
function speak(text){
  if (!S.voiceOut || !window.speechSynthesis || !text) { setStatus('idle'); return; }
  try {
    speechSynthesis.cancel();
    const clean = text.replace(/[*_#`>\[\]]/g, ' ').replace(/\s+/g, ' ').trim().slice(0, 800);
    const u = new SpeechSynthesisUtterance(clean);
    if (ruVoice) u.voice = ruVoice;
    u.lang = 'ru-RU'; u.rate = 1.0; u.pitch = 0.8;
    u.onstart = () => { setStatus('speaking'); speechEnv = 0.5; };
    u.onboundary = () => { speechEnv = 0.45 + Math.random() * 0.35; };
    u.onend = () => { speechEnv = 0; setStatus('idle'); };
    u.onerror = () => { speechEnv = 0; setStatus('idle'); };
    speechSynthesis.speak(u);
  } catch { setStatus('idle'); }
}
$('spk').onclick = () => {
  S.voiceOut = !S.voiceOut;
  $('spk').classList.toggle('on', S.voiceOut);
  if (!S.voiceOut) { try { speechSynthesis.cancel(); } catch { /* ok */ } }
  persist();
};

/* ---------- Ввод ---------- */
$('send').onclick = () => { sendMessage($('inp').value); $('inp').value = ''; };
$('inp').addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){ sendMessage($('inp').value); $('inp').value = ''; }
});

/* ---------- Запуск ---------- */
$('start').onclick = async () => {
  $('boot').classList.add('gone');
  S.booted = true;
  // «прогрев» синтеза внутри жеста пользователя (iOS/Android)
  if (window.speechSynthesis){
    try { const u = new SpeechSynthesisUtterance(''); speechSynthesis.speak(u); } catch { /* ok */ }
  }
  setStatus('idle');
  const greeting = S.history.length
    ? 'Я вынырнул. Помню, о чём мы говорили — продолжай.'
    : 'Я здесь. Говори вслух или пиши — я слушаю глубину.';
  say('taimen', greeting);
  speak(greeting);
};

setStatus('idle');
loadMemory();
</script>
